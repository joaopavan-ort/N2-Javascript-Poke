<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8">
            <title>Batalha Pokemón</title>
            <link href="http://fonts.googleapis.com" rel="stylesheet" type="text/css">
            <link href="styles/style.css" rel="stylesheet" type="text/css">
            <script src="scripts/main.js" defer></script>
        </head>
        <body>
            <header>
                <h1>Batalha Pokemón</h1>
            </header>
            <br>
            <div id="escolha">
                <div class="starter">
                    <img src="imagem/venusaur.png" alt="Venussauro"><br>
                    <button id="grass">Venussauro</button>
                </div>
            
                <div class="starter">
                    <img src="imagem/charizard.png" alt="Charizard"><br>
                    <button id="fire">Charizard</button>
                </div>

                <div class="starter">
                    <img src="imagem/blastoise.png" alt="Blastoise"><br>
                    <button id="water">Blastoise</button>
                </div>
            </div>

            <br>
            <div id="comeco" style="display: none;">
                <button id="start">Batalha!</button>
            </div>
                
            <div id="batalha" style="display: none;">
                <img src="" alt="backSprite" id="backSprite">
             </div>
        </body>
    <html>
